# Model arguments
model_name_or_path: Qwen/Qwen3-0.6B
torch_dtype: bfloat16
attn_implementation: sdpa

# LoRA arguments
use_peft: true
load_in_4bit: true
lora_r: 64
lora_alpha: 64
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj

# Data training arguments (pre-generated cyclic listwise dataset)
dataset_name: ./data/cyclic_ultrafeedback_m2_instruction_following_helpfulness
# dataset_mixture:
#   datasets:
#     - id: ./data/cyclic_ultrafeedback_m2_instruction_following_helpfulness
#       config: default
#       split: train
#       weight: 1.0
#   test_split_size: 25
#   seed: 0
dataset_format: listwise
preference_dimensions:
- instruction_following
- helpfulness
listwise_num_responses: 2
listwise_min_responses: 2
listwise_prompt_column: instruction
listwise_responses_column: completions
listwise_response_text_key: response
listwise_annotations_key: annotations
dataset_num_proc: 12

# DPOTrainer arguments
bf16: true
beta: 0.01
listwise: true
listwise_beta: 0.01
do_eval: true
eval_strategy: steps
eval_steps: 100
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: qwen3-1b-listwise-dpo-qlora-cyclic-if-help
learning_rate: 5.0e-6
log_level: info
logging_steps: 10
lr_scheduler_type: cosine
max_length: 1024
max_prompt_length: 512
num_train_epochs: 1
optim: paged_adamw_32bit
output_dir: outputs/qwen3-1b-listwise-dpo-qlora-cyclic-if-help
per_device_train_batch_size: 2
per_device_eval_batch_size: 8
push_to_hub: false
remove_unused_columns: false
report_to:
- wandb
run_name: qwen3-1b-listwise-dpo-qlora-cyclic-if-help
save_strategy: "steps"
save_steps: 100
save_total_limit: 1
seed: 42
warmup_ratio: 0.1
